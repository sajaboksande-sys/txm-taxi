<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تاكسي مسلاتة - النظام الذكي</title>
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --gray: #f4f4f4; }
        body { font-family: 'Arial', sans-serif; margin: 0; background: var(--gray); }
        .page { display: none; padding: 20px; max-width: 600px; margin: auto; }
        .active-page { display: block; }
        
        /* شاشة الترحيب */
        .welcome-card { text-align: center; background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 50px; }
        .btn-main { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-user { background: var(--primary); color: var(--dark); }
        .btn-driver { background: #28a745; color: white; }
        .btn-admin { background: transparent; color: #888; font-size: 14px; }

        /* التصميم العام */
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logout-btn { background: #ff4444; color: white; border: none; padding: 5px 15px; border-radius: 5px; float: left; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcome-page" class="page active-page">
        <div class="welcome-card">
            <h1 style="font-size: 40px; margin-bottom: 10px;">🚕</h1>
            <h2>تاكسي مسلاتة</h2>
            <p>مرحباً بك في تطبيقك المفضل، اختر من أنت:</p>
            <button class="btn-main btn-user" onclick="enterUser()">أنا راكب (اطلب رحلة) 👤</button>
            <button class="btn-main btn-driver" onclick="enterDriver()">أنا سائق (دخول) 🏎️</button>
            <button class="btn-admin" onclick="enterAdmin()">الإدارة ⚙️</button>
        </div>
    </div>

    <div id="user-page" class="page">
        <button class="logout-btn" onclick="goHome()">خروج</button>
        <h3>اطلب رحلتك الآن 🚕</h3>
        <input type="text" id="uName" placeholder="اسمك الكريم">
        <input type="tel" id="uPhone" placeholder="رقم هاتفك">
        <select id="uType" onchange="loadLocs()">
            <option value="داخل مسلاتة">داخل مسلاتة</option>
            <option value="خارج مسلاتة">خارج مسلاتة</option>
        </select>
        <select id="uLoc"></select>
        <select id="uDr"></select>
        <button class="btn-main btn-user" onclick="sendTrip()">تأكيد الحجز 🚕</button>
    </div>

    <div id="driver-page" class="page">
        <button class="logout-btn" onclick="goHome()">خروج</button>
        <h3 id="dr-hi">لوحة تحكم الكابتن</h3>
        <div id="trips-list">
            <p style="text-align:center;">جاري تحميل الطلبات...</p>
        </div>
    </div>

    <div id="admin-page" class="page">
        <button class="logout-btn" onclick="goHome()">خروج</button>
        <h3>لوحة التحكم الشاملة ⚙️</h3>
        
        <div class="card">
            <h4>➕ إضافة سائق جديد</h4>
            <input id="reg-name" placeholder="اسم السائق">
            <input id="reg-phone" placeholder="رقم الهاتف">
            <input id="reg-pass" placeholder="كلمة المرور">
            <button class="btn-main btn-driver" onclick="registerDriver()">حفظ السائق</button>
        </div>

        <div class="card">
            <h4>📍 إضافة وجهة جديدة</h4>
            <input id="loc-name" placeholder="اسم المنطقة">
            <input id="loc-price" placeholder="السعر">
            <button class="btn-main btn-user" onclick="addLocation()">إضافة الوجهة</button>
        </div>
    </div>

    <audio id="notifSound" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

    <script>
        const API = 'https://txm-taxi.onrender.com/api';
        let locsData = [];
        let lastTripsCount = 0;

        // --- وظائف التنقل والصلاحيات ---
        function goHome() { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('welcome-page').classList.add('active-page');
        }

        function enterUser() {
            document.getElementById('welcome-page').classList.remove('active-page');
            document.getElementById('user-page').classList.add('active-page');
            refresh();
        }

        async function enterDriver() {
            const phone = prompt("أدخل رقم هاتفك المسجل:");
            const pass = prompt("أدخل كلمة المرور:");
            
            try {
                const res = await fetch(`${API}/drivers`);
                const drivers = await res.json();
                const driver = drivers.find(d => d.phone === phone && d.password === pass);

                if (driver) {
                    document.getElementById('welcome-page').classList.remove('active-page');
                    document.getElementById('driver-page').classList.add('active-page');
                    document.getElementById('dr-hi').innerText = `أهلاً كابتن ${driver.driver_name}`;
                    refresh();
                } else { alert("❌ بيانات غير صحيحة!"); }
            } catch(e) { alert("❌ فشل الاتصال بالسيرفر"); }
        }

        function enterAdmin() {
            const masterPass = "msallata2026"; // كلمة السر الخاصة بك
            const entry = prompt("أدخل كلمة سر الإدارة:");
            if (entry === masterPass) {
                document.getElementById('welcome-page').classList.remove('active-page');
                document.getElementById('admin-page').classList.add('active-page');
                refresh();
            } else { alert("⚠️ غير مصرح لك!"); }
        }

        // --- وظائف البيانات ---
        async function refresh() {
            try {
                // جلب الوجهات والسائقين للراكب
                const resL = await fetch(`${API}/locations`);
                locsData = await resL.json();
                loadLocs();

                const resD = await fetch(`${API}/drivers`);
                const drs = await resD.json();
                document.getElementById('uDr').innerHTML = drs.map(d => `<option value="${d.driver_name}">${d.driver_name} (${d.car_type})</option>`).join('');

                // جلب الطلبات للسائق
                const resT = await fetch(`${API}/trips`);
                const trips = await resT.json();
                displayTrips(trips);

                if (trips.length > lastTripsCount && lastTripsCount !== 0) {
                    document.getElementById('notifSound').play();
                }
                lastTripsCount = trips.length;
            } catch(e) {}
        }

        function loadLocs() {
            const type = document.getElementById('uType').value;
            const filtered = locsData.filter(l => l.location_type === type);
            document.getElementById('uLoc').innerHTML = filtered.map(l => `<option value="${l.location_name}">${l.location_name} (${l.price} د.ل)</option>`).join('');
        }

        async function sendTrip() {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            const loc = document.getElementById('uLoc').value;
            const driver = document.getElementById('uDr').value;
            if(!name || !phone) return alert("⚠️ املأ بياناتك");
            await fetch(`${API}/trips`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, phone, loc, driver })
            });
            alert("✅ تم الطلب بنجاح!");
        }

        function displayTrips(trips) {
            const list = document.getElementById('trips-list');
            if(!list) return;
            list.innerHTML = trips.map(t => `
                <div class="card" style="border-right: 5px solid gold;">
                    <p>👤 <b>الراكب:</b> ${t.passenger_name}</p>
                    <p>📞 <b>هاتف:</b> <a href="tel:${t.phone}">${t.phone}</a></p>
                    <p>📍 <b>الوجهة:</b> ${t.pickup_point}</p>
                </div>
            `).join('') || '<p style="text-align:center;">لا توجد طلبات</p>';
        }

        async function registerDriver() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            await fetch(`${API}/drivers`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, phone, pass, car: "تويوتا", plate: "000" })
            });
            alert("✅ تم التسجيل");
        }

        setInterval(refresh, 10000);
    </script>
</body>
</html>
