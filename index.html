<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TX&M Msallata - الرادار الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --taxi-gold: #facc15; --dark-bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --success: #22c55e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark-bg); color: var(--text-main); margin: 0; padding-bottom: 90px; }
        
        .header { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; background: var(--card-bg); border-bottom: 3px solid var(--taxi-gold); position: sticky; top: 0; z-index: 1000; }
        .header h1 { margin: 0; font-size: 22px; color: var(--taxi-gold); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        h3 { color: var(--taxi-gold); font-size: 18px; margin-top: 0; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px; }
        
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn-taxi { width: 100%; padding: 14px; background: var(--taxi-gold); border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-taxi:active { transform: scale(0.98); }
        
        .navbar { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--taxi-gold); z-index: 1001; }
        .navbar button { background: none; border: none; color: #64748b; cursor: pointer; text-align: center; outline: none; }
        .navbar button.active { color: var(--taxi-gold); }
        .navbar button span { display: block; font-size: 11px; margin-top: 4px; }

        .star { font-size: 25px; color: #334155; cursor: pointer; }
        .star.gold { color: var(--taxi-gold); }
        .order-item { background: #0f172a; padding: 12px; border-radius: 10px; margin-top: 10px; border-right: 4px solid var(--taxi-gold); }
    </style>
</head>
<body>

<audio id="snd-new" src="https://assets.mixkit.co/active_storage/sfx/2505/2505-preview.mp3"></audio>
<audio id="snd-ok" src="https://assets.mixkit.co/active_storage/sfx/2051/2051-preview.mp3"></audio>

<div class="header">
    <i class="fas fa-taxi" style="color:var(--taxi-gold); font-size: 24px;"></i>
    <h1>TX&M MSALLATA</h1>
</div>

<div class="container">
    <div id="user-page" class="page active-page">
        <div id="u-step-1" class="card">
            <h3><i class="fas fa-paper-plane"></i> اطلب رحلتك</h3>
            <input type="text" id="uName" placeholder="اسم الراكب">
            <input type="tel" id="uPhone" placeholder="رقم الهاتف">
            <select id="uType" onchange="loadLocs()">
                <option value="داخل مسلاتة">داخل مسلاتة 🏠</option>
                <option value="خارج مسلاتة">خارج مسلاتة 🛣️</option>
            </select>
            <select id="uLoc"></select>
            <select id="uDr"></select>
            <button class="btn-taxi" onclick="sendTrip()">تأكيد الطلب 🚕</button>
        </div>

        <div id="u-step-wait" class="card" style="display:none; text-align:center;">
            <h3>جاري البحث عن كابتن...</h3>
            <div id="u-arrival" style="display:none; color:var(--success); margin-top:15px;">
                <h4>✅ تم قبول طلبك</h4>
                <p>يصلك السائق خلال: <b id="v-time">-</b> دقيقة</p>
            </div>
        </div>

        <div id="u-step-rate" class="card" style="display:none; text-align:center;">
            <h3>كيف كانت الرحلة؟</h3>
            <div id="stars">
                <span class="star" onclick="setStar(1)">★</span><span class="star" onclick="setStar(2)">★</span><span class="star" onclick="setStar(3)">★</span><span class="star" onclick="setStar(4)">★</span><span class="star" onclick="setStar(5)">★</span>
            </div>
            <button class="btn-taxi" style="margin-top:15px" onclick="finishRate()">إرسال التقييم</button>
        </div>
    </div>

    <div id="driver-page" class="page">
        <div id="dr-login-box" class="card">
            <h3><i class="fas fa-key"></i> دخول الكابتن</h3>
            <input type="tel" id="drPhone" placeholder="رقم الهاتف">
            <input type="password" id="drPass" placeholder="كلمة المرور">
            <button class="btn-taxi" onclick="loginDr()">دخول للنظام</button>
        </div>

        <div id="dr-dash" style="display:none;">
            <div class="card">
                <h3 id="dr-hi">مرحباً كابتن</h3>
                <div id="dr-orders">بانتظار الركاب...</div>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="card">
            <h3><i class="fas fa-user-plus"></i> إضافة سائق جديد</h3>
            <input type="text" id="reg-name" placeholder="اسم السائق الرباعي">
            <input type="tel" id="reg-phone" placeholder="رقم الهاتف">
            <input type="text" id="reg-car" placeholder="نوع السيارة">
            <input type="text" id="reg-plate" placeholder="رقم اللوحة">
            <input type="password" id="reg-pass" placeholder="تعيين كلمة مرور">
            <button class="btn-taxi" style="background:#475569; color:white;" onclick="registerDriver()">حفظ بيانات السائق</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-map-marked-alt"></i> إدارة الأسعار</h3>
            <input type="text" id="loc-name" placeholder="اسم المنطقة">
            <select id="adm-loc-type">
                <option value="داخل مسلاتة">داخل مسلاتة 🏠</option>
                <option value="خارج مسلاتة">خارج مسلاتة 🛣️</option>
            </select>
            <input type="number" id="loc-price" placeholder="السعر بالدينار">
            <button class="btn-taxi" onclick="addLocation()">إضافة الوجهة</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-trophy"></i> أفضل السائقين</h3>
            <div id="top-drivers-list">جاري التحميل...</div>
        </div>
    </div>
</div>

<nav class="navbar">
    <button onclick="navTo('user')" id="btn-user" class="active"><i class="fas fa-home"></i><span>الرئيسية</span></button>
    <button onclick="navTo('driver')" id="btn-driver"><i class="fas fa-car"></i><span>السائق</span></button>
    <button onclick="navTo('admin')" id="btn-admin"><i class="fas fa-user-shield"></i><span>المدير</span></button>
</nav>

<script>
    const API = 'https://txm-taxi.vercel.app/api';
    let curTid = null, locsData = [], userStars = 5, myDr = null;

    function navTo(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
        document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('active'));
        document.getElementById(p + '-page').classList.add('active-page');
        document.getElementById('btn-' + p).classList.add('active');
        if(p === 'admin') loadTopDrivers();
        refresh();
    }

    async function refresh() {
        try {
            const resL = await fetch(`${API}/locations`); 
            locsData = await resL.json(); 
            loadLocs();
            const resD = await fetch(`${API}/drivers/active`); 
            const drs = await resD.json();
            document.getElementById('uDr').innerHTML = drs.map(d => `<option value="${d.driver_name}">${d.driver_name} (${d.car_type})</option>`).join('') || '<option>لا يوجد سائقين نشطين</option>';
        } catch(e) {}
    }

    function loadLocs() {
        const type = document.getElementById('uType').value;
        const filtered = locsData.filter(l => l.location_type === type);
        document.getElementById('uLoc').innerHTML = filtered.map(l => `<option value="${l.location_name}" data-p="${l.price}">${l.location_name} (${l.price} د.ل)</option>`).join('');
    }

    async function sendTrip() {
        const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value, l = document.getElementById('uLoc');
        if(!n || !p) return alert("يرجى إدخال اسمك وهاتفك");
        const res = await fetch(`${API}/trips`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ passenger_name:n, passenger_phone:p, destination:l.value, driver_name:document.getElementById('uDr').value, price:l.options[l.selectedIndex].getAttribute('data-p') }) });
        const d = await res.json(); curTid = d.tripId;
        document.getElementById('u-step-1').style.display='none'; document.getElementById('u-step-wait').style.display='block';
        checkStatus();
    }

    function checkStatus() {
        const itv = setInterval(async () => {
            const r = await fetch(`${API}/trips/${curTid}`); const t = await r.json();
            if(t && t.status === 'Accepted') {
                document.getElementById('snd-ok').play();
                document.getElementById('u-arrival').style.display='block'; document.getElementById('v-time').innerText = t.arrival_time;
                clearInterval(itv);
                setTimeout(() => { document.getElementById('u-step-wait').style.display='none'; document.getElementById('u-step-rate').style.display='block'; }, 5000);
            }
        }, 3000);
    }

    function setStar(n) { userStars = n; document.querySelectorAll('.star').forEach((s,i) => s.classList.toggle('gold', i<n)); }
    async function finishRate() { await fetch(`${API}/trips/${curTid}/rate`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({rating: userStars}) }); location.reload(); }

    // دالة إضافة سائق (تستدعى من صفحة المدير)
    async function registerDriver() {
        const body = { 
            name: document.getElementById('reg-name').value, 
            phone: document.getElementById('reg-phone').value, 
            car: document.getElementById('reg-car').value, 
            plate: document.getElementById('reg-plate').value, 
            pass: document.getElementById('reg-pass').value 
        };
        const res = await fetch(`${API}/drivers`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        if(res.ok) { alert("تمت إضافة السائق بنجاح!"); refresh(); }
    }

    async function loginDr() {
        const res = await fetch(`${API}/driver/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone: drPhone.value, pass: drPass.value}) });
        const d = await res.json();
        if(res.ok) { myDr = d.driver; document.getElementById('dr-login-box').style.display='none'; document.getElementById('dr-dash').style.display='block'; document.getElementById('dr-hi').innerText = "الكابتن: " + myDr.driver_name; }
        else alert("بيانات الدخول غير صحيحة");
    }

    async function addLocation() {
        const name = document.getElementById('loc-name').value, type = document.getElementById('adm-loc-type').value, price = document.getElementById('loc-price').value;
        await fetch(`${API}/locations`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, type, price}) });
        alert("تم الحفظ"); refresh();
    }

    async function loadTopDrivers() {
        const r = await fetch(`${API}/admin/top-drivers`); const top = await r.json();
        document.getElementById('top-drivers-list').innerHTML = top.map((d, i) => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid rgba(255,255,255,0.05);"><span>${i+1}. ${d.driver_name}</span><span style="color:var(--taxi-gold)">${parseFloat(d.avg_stars).toFixed(1)} ★</span></div>`).join('') || "لا توجد بيانات";
    }

    refresh();
</script>
</body>
</html>
