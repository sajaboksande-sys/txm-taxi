<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تاكسي مسلاتة - النظام الذكي</title>
    <style>
        :root {
            --primary: #ffcc00; /* الأصفر الجريء */
            --primary-dark: #e6b800;
            --dark: #121212; /* الأسود العصري */
            --bg-dark: #1a1a1a;
            --text-light: #ffffff;
            --text-dark: #333333;
            --gray: #f4f4f4;
            --glass: rgba(255, 255, 255, 0.05); /* تأثير زجاجي */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--dark);
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
        }

        /* --- خلفية أيقونات متحركة (الجريئة) --- */
        body::before {
            content: "🚕 🏎️ 📍 📞 👤 ⚙️ 🗺️";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            font-size: 50px;
            color: rgba(255, 255, 255, 0.03); /* شفافة جداً */
            word-spacing: 100px;
            line-height: 150px;
            pointer-events: none;
            z-index: -1;
            animation: backgroundMove 20s linear infinite;
        }

        @keyframes backgroundMove {
            from { background-position: 0 0; }
            to { background-position: 100% 100%; }
        }

        .page {
            display: none;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .active-page { display: block; }

        /* --- شاشة الترحيب --- */
        .welcome-card {
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);
            padding: 50px 30px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 80px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .logo-icon {
            font-size: 70px;
            margin-bottom: 10px;
            display: inline-block;
            animation: carDrive 2s ease-in-out infinite alternate;
        }

        @keyframes carDrive {
            from { transform: translateX(-10px); }
            to { transform: translateX(10px); }
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 800;
            margin: 10px 0;
            color: var(--primary);
        }

        .welcome-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
        }

        /* --- الأزرار العصرية --- */
        .btn-main {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-main:active { transform: scale(0.98); }

        .btn-user {
            background-color: var(--primary);
            color: var(--dark);
            box-shadow: 0 6px 20px rgba(255, 204, 0, 0.4);
        }
        .btn-user:hover { background-color: var(--primary-dark); }

        .btn-driver {
            background-color: #28a745;
            color: white;
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        }
        .btn-driver:hover { background-color: #218838; }

        .btn-admin {
            background-color: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-top: 20px;
            text-decoration: underline;
        }

        /* --- تصميم الإدخال والقوائم --- */
        .form-group { margin-bottom: 15px; }
        
        label {
            display: block;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 5px;
            margin-right: 5px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background-color: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background-color: rgba(255,255,255,0.1);
            outline: none;
        }

        select option { background-color: var(--bg-dark); color: white; }

        /* --- تصميم البطاقات في الأقسام --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .card {
            background-color: var(--glass);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .card:hover { border-color: rgba(255,204,0,0.3); }

        .trip-card {
            border-right: 5px solid var(--primary);
            position: relative;
        }

        .trip-p { margin: 8px 0; font-size: 15px; display: flex; align-items: center; gap: 8px;}
        .trip-p b { color: var(--primary); }

        .logout-btn {
            background-color: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .logout-btn:hover { background-color: #ff4444; color: white; }

        /* --- تحسينات للإدارة --- */
        .admin-card-title { color: var(--primary); margin-top: 0; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="welcome-page" class="page active-page">
        <div class="welcome-card">
            <div class="logo-icon">🚕</div>
            <div class="welcome-title">تاكسي مسلاتة</div>
            <div class="welcome-subtitle">مرحباً بك، يرجى اختيار نوع الدخول:</div>
            
            <button class="btn-main btn-user" onclick="enterUser()">أنا راكب (اطلب رحلة) 👤</button>
            <button class="btn-main btn-driver" onclick="enterDriver()">أنا سائق (تسجيل دخول) 🏎️</button>
            
            <button class="btn-main btn-admin" onclick="enterAdmin()">⚙️ دخول الإدارة</button>
        </div>
    </div>

    <div id="user-page" class="page">
        <div class="section-header">
            <h3>اطلب رحلتك الآن</h3>
            <button class="logout-btn" onclick="goHome()">خروج ⬅️</button>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>👤 اسمك الكريم</label>
                <input type="text" id="uName" placeholder="مثلاً: محمد علي">
            </div>
            <div class="form-group">
                <label>📞 رقم هاتفك</label>
                <input type="tel" id="uPhone" placeholder="091XXXXXXX">
            </div>
            <div class="form-group">
                <label>🗺️ نوع الرحلة</label>
                <select id="uType" onchange="loadLocs()">
                    <option value="داخل مسلاتة">داخل مسلاتة 🏘️</option>
                    <option value="خارج مسلاتة">خارج مسلاتة 🛤️</option>
                </select>
            </div>
            <div class="form-group">
                <label>📍 الوجهة المحددة</label>
                <select id="uLoc"></select>
            </div>
            <div class="form-group">
                <label>🏎️ اختر كابتن متوفر</label>
                <select id="uDr"></select>
            </div>
            
            <button class="btn-main btn-user" onclick="sendTrip()">🚗 تأكيد طلب التاكسي</button>
        </div>
    </div>

    <div id="driver-page" class="page">
        <div class="section-header">
            <h3 id="dr-hi">لوحة تحكم الكابتن</h3>
            <button class="logout-btn" onclick="goHome()">خروج ⬅️</button>
        </div>
        
        <div id="trips-list">
            <p style="text-align:center;">جاري تحميل الطلبات الجديدة...</p>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="section-header">
            <h3>الإدارة الكاملة</h3>
            <button class="logout-btn" onclick="goHome()">خروج ⬅️</button>
        </div>
        
        <div class="card">
            <h4 class="admin-card-title">➕ إضافة سائق جديد</h4>
            <input id="reg-name" placeholder="👤 اسم السائق الثلاثي">
            <input id="reg-phone" placeholder="📞 رقم الهاتف">
            <input id="reg-pass" placeholder="🔑 كلمة المرور (للدخول)">
            <button class="btn-main btn-driver" onclick="registerDriver()">تسجيل الكابتن 🏎️</button>
        </div>

        <div class="card">
            <h4 class="admin-card-title">📍 إضافة وجهة جديدة</h4>
            <input id="loc-name" placeholder="🗺️ اسم المنطقة/الوجهة">
            <input id="loc-price" placeholder="💰 سعر الرحلة (د.ل)">
            <button class="btn-main btn-user" onclick="addLocation()">إضافة الوجهة ➕</button>
        </div>
    </div>

    <audio id="notifSound" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

    <script>
        // --- الكود البرمجي (لا تلمسه، قمنا بربطه مسبقاً) ---
        const API = 'https://txm-taxi.onrender.com/api';
        let locsData = [];
        let lastTripsCount = 0;

        function goHome() { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('welcome-page').classList.add('active-page');
        }

        function enterUser() {
            document.getElementById('welcome-page').classList.remove('active-page');
            document.getElementById('user-page').classList.add('active-page');
            refresh();
        }

        async function enterDriver() {
            const phone = prompt("👤 أدخل رقم هاتفك المسجل (الدخول للكابتن):");
            const pass = prompt("🔑 أدخل كلمة المرور:");
            if(!phone || !pass) return;
            
            try {
                const res = await fetch(`${API}/drivers`);
                const drivers = await res.json();
                const driver = drivers.find(d => d.phone === phone && d.password === pass);

                if (driver) {
                    document.getElementById('welcome-page').classList.remove('active-page');
                    document.getElementById('driver-page').classList.add('active-page');
                    document.getElementById('dr-hi').innerText = `أهلاً بك كابتن ${driver.driver_name}`;
                    refresh();
                } else { alert("❌ بيانات غير صحيحة، تأكد من الرقم وكلمة السر!"); }
            } catch(e) { alert("❌ فشل الاتصال بالسيرفر"); }
        }

        function enterAdmin() {
            const masterPass = "msallata2026"; // كلمة السر
            const entry = prompt("🔒 أدخل كلمة سر الإدارة الشاملة:");
            if (entry === masterPass) {
                document.getElementById('welcome-page').classList.remove('active-page');
                document.getElementById('admin-page').classList.add('active-page');
                refresh();
            } else { alert("⚠️ غير مصرح لك بدخول الإدارة!"); }
        }

        async function refresh() {
            try {
                const resL = await fetch(`${API}/locations`);
                locsData = await resL.json();
                loadLocs();

                const resD = await fetch(`${API}/drivers`);
                const drs = await resD.json();
                document.getElementById('uDr').innerHTML = drs.map(d => `<option value="${d.driver_name}">${d.driver_name} (${d.car_type || 'تاكسي'})</option>`).join('');

                const resT = await fetch(`${API}/trips`);
                const trips = await resT.json();
                displayTrips(trips);

                if (trips.length > lastTripsCount && lastTripsCount !== 0) {
                    document.getElementById('notifSound').play().catch(()=>{});
                }
                lastTripsCount = trips.length;
            } catch(e) {}
        }

        function loadLocs() {
            const type = document.getElementById('uType').value;
            const filtered = locsData.filter(l => l.location_type === type);
            document.getElementById('uLoc').innerHTML = filtered.map(l => `<option value="${l.location_name}">${l.location_name} (${l.price} د.ل)</option>`).join('') || '<option>لا توجد وجهات</option>';
        }

        async function sendTrip() {
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            const loc = document.getElementById('uLoc').value;
            const driver = document.getElementById('uDr').value;
            if(!name || !phone) return alert("⚠️ يرجى إدخال اسمك ورقم هاتفك");
            await fetch(`${API}/trips`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, phone, loc, driver })
            });
            alert("✅ تم إرسال طلبك! الكابتن في الطريق إليك.");
            document.getElementById('uName').value = ''; document.getElementById('uPhone').value = '';
        }

        function displayTrips(trips) {
            const list = document.getElementById('trips-list');
            if(!list) return;
            list.innerHTML = trips.map(t => `
                <div class="card trip-card">
                    <p class="trip-p">👤 <b>اسم الراكب:</b> ${t.passenger_name}</p>
                    <p class="trip-p">📞 <b>الهاتف:</b> <a href="tel:${t.phone}" style="color:white; text-decoration:none;">${t.phone} 📞</a></p>
                    <p class="trip-p">📍 <b>الوجهة:</b> ${t.pickup_point}</p>
                    <p class="trip-p" style="font-size:12px; color:rgba(255,255,255,0.5);">⏰ ${new Date(t.created_at).toLocaleTimeString('ar-LY')}</p>
                </div>
            `).join('') || '<p style="text-align:center;">لا توجد طلبات جديدة حالياً..😴</p>';
        }

        async function registerDriver() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !phone || !pass) return alert("⚠️ املأ بيانات السائق الأساسية");
            await fetch(`${API}/drivers`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, phone, pass, car: "تويوتا الكامري", plate: "000" })
            });
            alert("✅ تم تسجيل الكابتن بنجاح!");
            document.getElementById('reg-name').value=''; document.getElementById('reg-phone').value=''; document.getElementById('reg-pass').value='';
        }

        async function addLocation() {
            const name = document.getElementById('loc-name').value;
            const type = document.getElementById('uType').value;
            const price = document.getElementById('loc-price').value;
            if(!name || !price) return alert("⚠️ املأ بيانات الوجهة والسعر");
            await fetch(`${API}/locations`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, type, price })
            });
            alert("✅ تمت إضافة الوجهة الجديدة");
            document.getElementById('loc-name').value=''; document.getElementById('loc-price').value='';
        }

        setInterval(refresh, 10000); // تحديث تلقائي كل 10 ثواني
    </script>
</body>
</html>
