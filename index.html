<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تاكسي مسلاتة - النسخة المستقرة</title>
    <style>
        :root { --gold: #ffcc00; --dark-bg: #0a0a0a; --card-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; direction: rtl; }
        .page { display: none; padding: 20px; max-width: 500px; margin: auto; }
        .active-page { display: block; }
        .glass-card { background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--glass-border); background: #111; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; }
        .ad-banner { border: 1px dashed var(--gold); padding: 10px; text-align: center; border-radius: 10px; margin-bottom: 15px; color: var(--gold); }
        .trip-card { border-right: 4px solid var(--gold); background: var(--card-bg); padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .logout { color: #ff4444; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="welcome-page" class="page active-page">
        <div style="text-align:center; margin-top:20vh;">
            <h1 id="secret-logo" style="font-size:60px; cursor:pointer;">🚕</h1>
            <h1>تاكسي مسلاتة</h1>
            <button class="btn btn-gold" onclick="showPage('user-page')">طلب رحلة</button>
            <button class="btn" style="background:#222; color:#fff;" onclick="enterDriver()">دخول السائق</button>
        </div>
    </div>

    <div id="user-page" class="page">
        <div style="display:flex; justify-content:space-between;">
            <h3>حجز رحلة</h3>
            <span class="logout" onclick="showPage('welcome-page')">رجوع</span>
        </div>
        <div class="ad-banner" id="ad-text">جاري تحميل الإعلانات...</div>
        <div class="glass-card">
            <input type="text" id="uName" placeholder="الاسم">
            <input type="tel" id="uPhone" placeholder="رقم الهاتف">
            <select id="uType" onchange="loadLocs()">
                <option value="داخل مسلاتة">داخل مسلاتة</option>
                <option value="خارج مسلاتة">خارج مسلاتة</option>
            </select>
            <select id="uLoc"></select>
            <select id="uDr"></select>
            <button class="btn btn-gold" onclick="sendTrip()">تأكيد الطلب</button>
        </div>
    </div>

    <div id="driver-page" class="page">
        <div style="display:flex; justify-content:space-between;">
            <h3 id="dr-hi">الطلبات</h3>
            <span class="logout" onclick="showPage('welcome-page')">خروج</span>
        </div>
        <div id="trips-list"></div>
    </div>

    <div id="admin-page" class="page">
        <h3>لوحة التحكم</h3>
        <div class="glass-card">
            <h4>إضافة سائق</h4>
            <input id="reg-name" placeholder="اسم السائق">
            <input id="reg-phone" placeholder="الهاتف">
            <input id="reg-pass" placeholder="كلمة السر">
            <button class="btn btn-gold" onclick="registerDriver()">حفظ السائق</button>
        </div>
        <div class="glass-card">
            <h4>إضافة وجهة</h4>
            <input id="loc-name" placeholder="اسم المنطقة">
            <input id="loc-price" placeholder="السعر">
            <button class="btn btn-gold" onclick="addLocation()">حفظ الوجهة</button>
        </div>
        <button class="btn" onclick="showPage('welcome-page')">إغلاق</button>
    </div>

    <script>
        const API = 'https://txm-taxi.onrender.com/api';
        let locsData = [], ads = ["🔥 عروض خاصة اليوم!", "🚕 تاكسي مسلاتة الأسرع دائماً"], adminClicks = 0;

        document.getElementById('secret-logo').onclick = () => {
            adminClicks++;
            if(adminClicks === 3) {
                if(prompt("كلمة السر:") === "msallata2541995") showPage('admin-page');
                adminClicks = 0;
            }
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            refresh();
        }

        async function refresh() {
            try {
                const resL = await fetch(`${API}/locations`).then(r => r.json());
                const resD = await fetch(`${API}/drivers`).then(r => r.json());
                const resT = await fetch(`${API}/trips`).then(r => r.json());

                locsData = Array.isArray(resL) ? resL : [];
                loadLocs();

                const drs = Array.isArray(resD) ? resD : [];
                document.getElementById('uDr').innerHTML = drs.map(d => `<option>${d.driver_name}</option>`).join('') || '<option>لا يوجد سائقين</option>';

                const trips = Array.isArray(resT) ? resT : [];
                document.getElementById('trips-list').innerHTML = trips.map(t => `
                    <div class="trip-card">
                        <b>👤 ${t.passenger_name}</b> | 📍 ${t.pickup_point}<br>
                        <a href="tel:${t.phone}" style="color:var(--gold)">اتصال: ${t.phone}</a>
                    </div>
                `).join('') || "لا توجد طلبات";
            } catch(e) { console.error("Refresh Error"); }
        }

        function loadLocs() {
            const type = document.getElementById('uType').value;
            const filtered = locsData.filter(l => l.location_type === type);
            document.getElementById('uLoc').innerHTML = filtered.map(l => `<option value="${l.location_name}">${l.location_name} (${l.price} د.ل)</option>`).join('') || '<option>لا توجد وجهات</option>';
        }

        async function sendTrip() {
            const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value;
            const l = document.getElementById('uLoc').value, d = document.getElementById('uDr').value;
            if(!n || !p) return alert("أكمل البيانات");
            await fetch(`${API}/trips`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:n, phone:p, loc:l, driver:d}) });
            alert("تم الطلب!"); refresh();
        }

        async function registerDriver() {
            const name = document.getElementById('reg-name').value, phone = document.getElementById('reg-phone').value, pass = document.getElementById('reg-pass').value;
            await fetch(`${API}/drivers`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, phone, pass, car:'تويوتا', plate:'000'}) });
            alert("تم الحفظ"); refresh();
        }

        async function addLocation() {
            const name = document.getElementById('loc-name').value, price = document.getElementById('loc-price').value, type = document.getElementById('uType').value;
            await fetch(`${API}/locations`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, price, type}) });
            alert("تم الحفظ"); refresh();
        }

        // تدوير الإعلانات
        let adIdx = 0;
        setInterval(() => {
            document.getElementById('ad-text').innerText = ads[adIdx];
            adIdx = (adIdx + 1) % ads.length;
        }, 5000);

        setInterval(refresh, 10000);
        refresh();
    </script>
</body>
</html>
