<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TX&M Msallata - الرادار الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --taxi-gold: #facc15; --dark-bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --success: #22c55e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark-bg); color: var(--text-main); margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .header { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; background: var(--card-bg); border-bottom: 3px solid var(--taxi-gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header h1 { margin: 0; font-size: 20px; color: var(--taxi-gold); letter-spacing: 1px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); padding: 20px; border-radius: 18px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        h3 { color: var(--taxi-gold); font-size: 18px; margin-top: 0; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; }
        .btn-taxi { width: 100%; padding: 15px; background: var(--taxi-gold); border: none; border-radius: 12px; color: #000; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .navbar { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--taxi-gold); z-index: 1001; }
        .navbar button { background: none; border: none; color: #94a3b8; cursor: pointer; text-align: center; flex: 1; }
        .navbar button.active { color: var(--taxi-gold); }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-taxi" style="color:var(--taxi-gold);"></i>
    <h1>TX&M MSALLATA</h1>
</div>

<div class="container">
    <div id="user-page" class="page active-page">
        <div class="card">
            <h3><i class="fas fa-map-marker-alt"></i> اطلب رحلتك الآن</h3>
            <input type="text" id="uName" placeholder="اسمك الكريم">
            <input type="tel" id="uPhone" placeholder="رقم الهاتف للتواصل">
            <select id="uType" onchange="loadLocs()">
                <option value="داخل مسلاتة">داخل مسلاتة 🏠</option>
                <option value="خارج مسلاتة">خارج مسلاتة 🛣️</option>
            </select>
            <select id="uLoc"></select>
            <select id="uDr"><option>جاري البحث عن سائقين...</option></select>
            <button class="btn-taxi" onclick="sendTrip()">تأكيد الحجز 🚕</button>
        </div>
    </div>

    <div id="driver-page" class="page">
        <div id="dr-login-box" class="card">
            <h3><i class="fas fa-id-card"></i> دخول السائقين</h3>
            <input type="tel" id="drPhone" placeholder="رقم الهاتف">
            <input type="password" id="drPass" placeholder="كلمة المرور">
           <button class="btn-taxi" onclick="loginDr()">تسجيل الدخول</button>
        </div>
        <div id="dr-dash" style="display:none;" class="card">
            <h3 id="dr-hi">لوحة التحكم</h3>
            <div id="dr-orders">بانتظار الطلبات...</div>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="card">
            <h3><i class="fas fa-user-plus"></i> تسجيل سائق</h3>
            <input type="text" id="reg-name" placeholder="الاسم الكامل">
            <input type="tel" id="reg-phone" placeholder="رقم الهاتف">
            <input type="text" id="reg-car" placeholder="نوع السيارة">
            <input type="text" id="reg-plate" placeholder="رقم اللوحة">
            <input type="password" id="reg-pass" placeholder="كلمة المرور">
            <button class="btn-taxi" onclick="registerDriver()">اعتماد السائق</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-coins"></i> إضافة وجهة</h3>
            <input type="text" id="loc-name" placeholder="اسم الوجهة">
            <select id="adm-loc-type">
                <option value="داخل مسلاتة">داخل مسلاتة</option>
                <option value="خارج مسلاتة">خارج مسلاتة</option>
            </select>
            <input type="number" id="loc-price" placeholder="السعر">
            <button class="btn-taxi" onclick="addLocation()">إضافة الوجهة</button>
        </div>
    </div>
</div>

<nav class="navbar">
    <button onclick="navTo('user')" id="btn-user" class="active"><i class="fas fa-home"></i><span>الرئيسية</span></button>
    <button onclick="navTo('driver')" id="btn-driver"><i class="fas fa-car-side"></i><span>السائق</span></button>
    <button onclick="navTo('admin')" id="btn-admin"><i class="fas fa-user-shield"></i><span>الإدارة</span></button>
</nav>

<script>
    const API = 'https://txm-taxi.onrender.com/api';
    let locsData = [];

    // 1. التنقل بين الصفحات
    function navTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId + '-page').classList.add('active-page');
        document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + pageId).classList.add('active');
    }

    // 2. تحميل الوجهات بناءً على النوع (داخل/خارج مسلاتة)
    function loadLocs() {
        const type = document.getElementById('uType').value;
        const filtered = locsData.filter(l => l.location_type === type);
        document.getElementById('uLoc').innerHTML = filtered.map(l => 
            `<option value="${l.location_name}">${l.location_name} (${l.price} د.ل)</option>`
        ).join('') || '<option>لا توجد وجهات مضافة</option>';
    }

    // 3. تحديث البيانات (الوجهات والسائقين) عند فتح التطبيق
    async function refresh() {
        try {
            const resL = await fetch(`${API}/locations`);
            locsData = await resL.json();
            loadLocs();

            const resD = await fetch(`${API}/drivers`); 
            const drs = await resD.json();
            const uDr = document.getElementById('uDr');
            if(uDr) {
                uDr.innerHTML = drs.map(d => 
                    `<option value="${d.driver_name}">${d.driver_name} - ${d.car_type}</option>`
                ).join('') || '<option disabled>لا يوجد كباتن متوفرين</option>';
            }
        } catch(e) { console.error("خطأ في جلب البيانات:", e); }
    }

    // 4. دالة تأكيد الطلب للمستخدم (الزر الذي لا يعمل عندك)
    async function sendTrip() {
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        const loc = document.getElementById('uLoc').value;
        const driver = document.getElementById('uDr').value;

        if(!name || !phone) return alert("⚠️ يرجى إدخال الاسم ورقم الهاتف");

        try {
            const res = await fetch(`${API}/trips`, { // تأكد من وجود مسار /api/trips في السيرفر
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, loc, driver })
            });
            alert("✅ تم إرسال طلبك بنجاح! انتظر اتصال الكابتن.");
        } catch(e) { alert("❌ فشل إرسال الطلب، تأكد من اتصال الإنترنت"); }
    }

    // 5. دالة تسجيل دخول السائق (الزر الآخر الذي لا يعمل)
    async function loginDr() {
        const phone = document.getElementById('drPhone').value;
        const pass = document.getElementById('drPass').value;

        if (!phone || !pass) return alert("⚠️ أدخل رقم الهاتف وكلمة المرور");

        try {
            const res = await fetch(`${API}/drivers`);
            const drivers = await res.json();
            const driver = drivers.find(d => d.phone === phone && d.password === pass);

            if (driver) {
                document.getElementById('dr-login-box').style.display = 'none';
                document.getElementById('dr-dash').style.display = 'block';
                document.getElementById('dr-hi').innerText = `أهلاً بك كابتن: ${driver.driver_name}`;
            } else {
                alert("❌ بيانات الدخول غير صحيحة");
            }
        } catch (e) { alert("❌ خطأ في التحقق من البيانات"); }
    }

    // 6. تسجيل سائق جديد (الإدارة)
    async function registerDriver() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const car = document.getElementById('reg-car').value;
        const plate = document.getElementById('reg-plate').value;
        const pass = document.getElementById('reg-pass').value;

        if(!name || !phone || !pass) return alert("⚠️ املأ الحقول الأساسية");

        try {
            await fetch(`${API}/drivers`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, car, plate, pass })
            });
            alert("✅ تم تسجيل السائق");
            refresh();
        } catch(e) { alert("❌ فشل التسجيل"); }
    }

    // 7. إضافة وجهة جديدة (الإدارة)
    async function addLocation() {
        const name = document.getElementById('loc-name').value;
        const type = document.getElementById('adm-loc-type').value;
        const price = document.getElementById('loc-price').value;

        if(!name || !price) return alert("⚠️ املأ بيانات الوجهة");

        try {
            await fetch(`${API}/locations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, type, price })
            });
            alert("✅ تمت إضافة الوجهة");
            refresh();
        } catch(e) { alert("❌ فشل الإضافة"); }
    }

    // تشغيل التحديث التلقائي عند فتح الصفحة
    refresh();
</script>
</body>
</html>
