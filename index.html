<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تاكسي مسلاتة - النسخة الاحترافية 2026</title>
    <style>
        :root {
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --dark-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --success: #00c853;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية الأيقونات المتحركة */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.04;
            font-size: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            pointer-events: none;
            animation: moveBG 20s linear infinite;
        }
        @keyframes moveBG { from { transform: translateY(0); } to { transform: translateY(-50px); } }

        .page { display: none; padding: 20px; max-width: 480px; margin: auto; animation: slideUp 0.4s ease-out; }
        .active-page { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* شاشة الترحيب */
        .welcome-box {
            text-align: center;
            margin-top: 10vh;
            padding: 40px 25px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .logo-btn {
            font-size: 90px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--gold-glow));
        }
        .logo-btn:active { transform: scale(0.85); }

        /* شريط الإعلانات */
        .ad-banner {
            background: linear-gradient(90deg, rgba(255,204,0,0.15), transparent);
            border: 1px dashed var(--gold);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            position: relative;
        }
        .ad-tag { position: absolute; top: -10px; right: 10px; background: var(--gold); color: #000; font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        #ad-text { color: var(--gold); font-weight: bold; font-size: 14px; transition: 0.5s; }

        /* الأزرار */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 10px 20px var(--gold-glow); }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 15px 25px var(--gold-glow); }
        .btn-outline { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }

        /* الكروت والحقول */
        .glass-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 22px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }
        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3);
            color: #fff; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--gold); }

        /* لوحة الشرف */
        .top-driver-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .trip-card {
            background: linear-gradient(to left, rgba(255,204,0,0.05), transparent);
            border-right: 4px solid var(--gold);
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
        }

        .logout-link { color: #ff4444; font-size: 13px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="bg-pattern">🚕 🏎️ 📍 📱 🚕 🏎️ 📍 📱 🚕 🏎️ 📍 📱 🚕 🏎️ 📍 📱</div>

    <div id="welcome-page" class="page active-page">
        <div class="welcome-box">
            <div class="logo-btn" id="secret-logo">🚕</div>
            <h1 style="margin:10px 0;">تاكسي مسلاتة</h1>
            <p style="color:var(--text-dim);">الرفاهية والأمان في كل مشوار</p>
            <button class="btn btn-gold" onclick="showPage('user-page')">اطلب رحلة 👤</button>
            <button class="btn btn-outline" onclick="enterDriver()">دخول الكابتن 🏎️</button>
        </div>
    </div>

    <div id="user-page" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>احجز رحلتك</h2>
            <span class="logout-link" onclick="goHome()">رجوع</span>
        </div>

        <div class="ad-banner">
            <div class="ad-tag">AD ممول</div>
            <span id="ad-text">جاري تحميل العروض...</span>
        </div>

        <div class="glass-card" style="border-right: 4px solid var(--success);">
            <h4 style="margin:0 0 10px 0; color:var(--success);">🏆 كباتن التميز (الأكثر طلباً)</h4>
            <div id="top-drivers"></div>
        </div>

        <div class="glass-card">
            <input type="text" id="uName" placeholder="👤 اسمك">
            <input type="tel" id="uPhone" placeholder="📞 رقم هاتفك">
            <select id="uType" onchange="loadLocs()">
                <option value="داخل مسلاتة">داخل مسلاتة 🏘️</option>
                <option value="خارج مسلاتة">خارج مسلاتة 🛤️</option>
            </select>
            <select id="uLoc"></select>
            <select id="uDr"></select>
            <button class="btn btn-gold" onclick="sendTrip()">تأكيد الحجز الآن 🚗</button>
        </div>
    </div>

    <div id="driver-page" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="dr-hi">طلبات الكابتن</h2>
            <span class="logout-link" onclick="goHome()">خروج</span>
        </div>
        <div id="trips-list"></div>
    </div>

    <div id="admin-page" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>إدارة النظام ⚙️</h2>
            <span class="logout-link" onclick="goHome()">إغلاق</span>
        </div>
        
        <div class="glass-card">
            <h4 style="color:var(--gold);">📣 تحديث الإعلانات</h4>
            <input id="ad-input" placeholder="نص الإعلان الجديد">
            <button class="btn btn-gold" style="padding:10px;" onclick="addAd()">نشر الإعلان</button>
        </div>

        <div class="glass-card">
            <h4 style="color:var(--gold);">👤 إضافة كابتن</h4>
            <input id="reg-name" placeholder="الاسم">
            <input id="reg-phone" placeholder="الهاتف">
            <input id="reg-pass" placeholder="الباسورد">
            <button class="btn btn-gold" style="padding:10px;" onclick="registerDriver()">حفظ</button>
        </div>
    </div>

    <audio id="notifSound" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

    <script>
        const API = 'https://txm-taxi.onrender.com/api';
        let locsData = [], lastTripsCount = 0, adminClicks = 0;
        let ads = ["🔥 خصم 20% لدى محلات المدينة!", "🚕 تاكسي مسلاتة.. رفيقك في كل طريق"];

        // الدخول السري
        document.getElementById('secret-logo').onclick = () => {
            adminClicks++;
            if(adminClicks === 3) {
                if(prompt("🔒 كلمة السر:") === "msallata2026") showPage('admin-page');
                adminClicks = 0;
            }
            setTimeout(() => adminClicks = 0, 2000);
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            refresh();
        }

        function goHome() { showPage('welcome-page'); }

        async function enterDriver() {
            const ph = prompt("📞 هاتفك:"), ps = prompt("🔑 الباسورد:");
            const res = await fetch(`${API}/drivers`);
            const drs = await res.json();
            const dr = drs.find(d => d.phone === ph && d.password === ps);
            if(dr) { showPage('driver-page'); document.getElementById('dr-hi').innerText = `أهلاً كابتن ${dr.driver_name}`; }
            else alert("خطأ في البيانات");
        }

        async function refresh() {
            try {
                const [resL, resD, resT] = await Promise.all([fetch(`${API}/locations`), fetch(`${API}/drivers`), fetch(`${API}/trips`)]);
                locsData = await resL.json();
                loadLocs();
                const drs = await resD.json();
                document.getElementById('uDr').innerHTML = drs.map(d => `<option value="${d.driver_name}">${d.driver_name}</option>`).join('');
                
                // لوحة الشرف
                document.getElementById('top-drivers').innerHTML = drs.slice(0,3).map(d => `
                    <div class="top-driver-item">
                        <span>⭐ كابتن ${d.driver_name}</span>
                        <span style="color:var(--gold); font-size:12px;">${Math.floor(Math.random()*80)+20} رحلة ✅</span>
                    </div>
                `).join('');

                const trips = await resT.json();
                document.getElementById('trips-list').innerHTML = trips.map(t => `
                    <div class="trip-card">
                        <b>👤 ${t.passenger_name}</b><br>
                        <small>📍 ${t.pickup_point}</small><br>
                        <a href="tel:${t.phone}" style="color:var(--gold); font-size:13px;">اتصال 📞 ${t.phone}</a>
                    </div>
                `).join('') || "لا طلبات";

                if (trips.length > lastTripsCount && lastTripsCount !== 0) document.getElementById('notifSound').play().catch(()=>{});
                lastTripsCount = trips.length;
            } catch(e){}
        }

        function loadLocs() {
            const type = document.getElementById('uType').value;
            const filtered = locsData.filter(l => l.location_type === type);
            document.getElementById('uLoc').innerHTML = filtered.map(l => `<option value="${l.location_name}">${l.location_name} (${l.price} د.ل)</option>`).join('');
        }

        async function sendTrip() {
            const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value;
            if(!n || !p) return alert("اكمل البيانات");
            await fetch(`${API}/trips`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: n, phone: p, loc: document.getElementById('uLoc').value, driver: document.getElementById('uDr').value })
            });
            alert("✅ تم إرسال الطلب!");
        }

        function addAd() {
            const val = document.getElementById('ad-input').value;
            if(val) { ads.push(val); alert("تم النشر"); document.getElementById('ad-input').value = ""; }
        }

        // تدوير الإعلانات
        let adIdx = 0;
        setInterval(() => {
            const el = document.getElementById('ad-text');
            if(el) { el.style.opacity = 0; setTimeout(() => { el.innerText = ads[adIdx]; el.style.opacity = 1; adIdx = (adIdx+1)%ads.length; }, 500); }
        }, 6000);

        setInterval(refresh, 10000);
        refresh();
    </script>
</body>
</html>
